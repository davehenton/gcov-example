name: Cpp Linter

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: cpp-linter/cpp-linter-action@v2
      with:
        style: 'LLVM'
        tidy-checks: '-*' # disable tidy check
        lines-changed-only: 'false'

    - name: Fail fast?!
      if: steps.linter.outputs.checks-failed > 0
      run: exit 1
